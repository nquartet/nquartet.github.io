<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N Quartet | フルート・バイオリン・ビオラ・チェロ</title>
    <style>
        /* 全体のスタイル */
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            margin: 0;
            padding: 0;
            color: #5d4037; /* 温かみのあるブラウン */
            background-color: #fdfaf5; /* 柔らかなクリーム色 */
            line-height: 1.6;
        }

        /* ヘッダー */
        header {
            background-color: #fff;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            color: #a67c52; /* ゴールド系のアクセント */
            letter-spacing: 2px;
        }

        /* メイン画像（ヒーローセクション） */
        .hero {
            max-width: 1000px;
            margin: 40px auto;
            text-align: center;
            padding: 0 20px;
        }

        .hero img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* 紹介セクション */
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }

        .about h2 {
            border-bottom: 2px solid #e0d5c1;
            display: inline-block;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        /* メンバー紹介 */
        .members {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .member-card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #eee;
        }

        .instrument {
            font-weight: bold;
            display: block;
            color: #a67c52;
        }

        /* フッター */
        footer {
            background-color: #a67c52;
            color: white;
            text-align: center;
            padding: 30px 0;
            margin-top: 60px;
        }

        /* レスポンシブ対応 */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>N Quartet</h1>
        <p>〜 4つの音色が織りなす、優しいひととき 〜</p>
    </header>

    <div class="hero">
        <img src="imgs/Gemini_Generated_Image_mwi4qumwi4qumwi4.png" alt="Nカルテットのシルエットイラスト">
    </div>

    <div class="container about">
        <h2>About Us</h2>
        <p>
            Nカルテットは、フルート、バイオリン、ビオラ、チェロの4人で結成されたアンサンブルです。<br>
            クラシックからポップスまで、聴く人の心に寄り添う温かな音楽をお届けします。
        </p>

        <div class="members">
            <div class="member-card">
                <span class="instrument">Flute</span>
                <p>女性メンバー</p>
            </div>
            <div class="member-card">
                <span class="instrument">Violin</span>
                <p>男性メンバー</p>
            </div>
            <div class="member-card">
                <span class="instrument">Viola</span>
                <p>女性メンバー</p>
            </div>
            <div class="member-card">
                <span class="instrument">Cello</span>
                <p>男性メンバー</p>
            </div>
        </div>
    </div>

    <div class="container">
        <h2>Contact</h2>
        <p>演奏依頼やお問い合わせは下記までお気軽にご連絡ください。</p>
        <p>📧 info@n-quartet.example.com</p>
    </div>

    <footer>
        &copy; 2026 N Quartet All Rights Reserved.
    </footer>

</body>
</html>
